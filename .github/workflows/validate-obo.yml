# This is a basic workflow to help you get started with Actions

name: obo-file-validation

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches:
      - master
      - main
    paths:
      - 'PSI-MOD.obo'
      - '.github/binaries/*'

  pull_request:
    branches: [ master, main ]
    paths:
      - 'PSI-MOD.obo'
      - '.github/binaries/*'

permissions: 
  contents: write

jobs:
  fix:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v6
      with:
        fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

    - name: Get changed lines
      id: detect_changes
      run: |
          if ${{ github.event_name == 'pull_request' }}; then
            echo "changed_lines=$(git diff --unified=0 --no-color --no-prefix -r HEAD^1 HEAD PSI-MOD.obo | grep -oP '^@@ -\d+(,\d+)? \+\K\d+' | tr '\n' ',')" >> $GITHUB_OUTPUT
          else
            echo "changed_lines=$(git diff --unified=0 --no-color --no-prefix ${{ github.event.before }} ${{ github.event.after }} PSI-MOD.obo  | grep -oP '^@@ -\d+(,\d+)? \+\K\d+' | tr '\n' ',')" >> $GITHUB_OUTPUT
          fi

    - name: Lint main OBO file
      run: ./.github/binaries/psi-obo-helper lint PSI-MOD.obo ${{ steps.detect_changes.outputs.changed_lines }}

    - name: Fix and format main OBO file
      run: ./.github/binaries/psi-obo-helper fix PSI-MOD.obo

    - name: Create newstyle Obo (for Owl conversion)
      run: ./.github/binaries/psi-obo-helper newfmt PSI-MOD.obo

    - name: Generate Owl
      run: |
        docker pull obolibrary/robot:v1.9.10
        # Replace the imports of the UO and PATO ontology .obo files with the equivalent .owl files
        export JAVA_TOOL_OPTIONS=-Xmx4G
        docker run --rm -v ${{ github.workspace }}:/work obolibrary/robot:v1.9.10 robot convert -vvv -i /work/PSI-MOD-newstyle.obo -o /work/PSI-MOD.owl --format owl

    - name: Check for Changes
      id: check_changes
      run: echo "has_changes=$(if [ -n "$(git status --porcelain)" ]; then echo "true"; else echo "false"; fi)" >> $GITHUB_OUTPUT

    - name: Push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git config --global user.name 'OboRobo'
        git config --global user.email 'oborobo@users.noreply.github.com'
        git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}
        git commit -am "Automated fixes"
        git push
